<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline - LeetMastery</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f9fafb;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .card {
      background: white;
      border-radius: 1.25rem;
      padding: 2rem 1.75rem;
      max-width: 380px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .icon {
      width: 52px; height: 52px;
      background: #ecfdf5;
      border-radius: 1rem;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1rem;
      font-size: 1.6rem;
    }
    h1 { font-size: 1.15rem; font-weight: 700; color: #111827; margin-bottom: 0.4rem; }
    p  { font-size: 0.85rem; color: #6b7280; line-height: 1.6; margin-bottom: 1.25rem; }
    .btn-grind {
      background: #059669; color: white;
      border: none; border-radius: 0.75rem;
      padding: 0.75rem 1.25rem;
      font-size: 0.9rem; font-weight: 600;
      cursor: pointer; width: 100%;
      margin-bottom: 0.5rem;
    }
    .btn-secondary {
      background: #f3f4f6; color: #374151;
      border: none; border-radius: 0.75rem;
      padding: 0.65rem 1.25rem;
      font-size: 0.85rem; font-weight: 500;
      cursor: pointer; width: 100%;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">&#128225;</div>
    <h1>You're offline</h1>
    <p>Grind still works without internet. Write code from memory on all 727 questions.</p>
    <button type="button" class="btn-grind" id="open-grind">Grind - write code offline</button>
    <button type="button" class="btn-secondary" id="go-back">Go back</button>
  </div>
  <script>
    document.getElementById('open-grind').onclick = function () {
      window.location.assign('/grind-offline.html')
    }
    document.getElementById('go-back').onclick = function () {
      if (history.length > 1) history.back()
      else window.location.assign('/grind-offline.html')
    }
  </script>
</body>
</html>
